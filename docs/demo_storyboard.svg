<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F2E8"/>
      <stop offset="1" stop-color="#F2F7F4"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#19211C" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1600" height="900" rx="36" fill="url(#bg3)"/>
  <text x="80" y="92" fill="#17211C" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700">OKX 财管双子星 · Demo Storyboard</text>
  <text x="80" y="128" fill="#5C665F" font-family="Arial, Helvetica, sans-serif" font-size="22">适合放在作品页中的文字演示流程图</text>

  <rect x="90" y="220" width="280" height="420" rx="28" fill="#FFFDF8" stroke="#DDD1BC" filter="url(#shadow3)"/>
  <text x="126" y="278" fill="#0E6B4D" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">01 · CFO 审核账户</text>
  <text x="126" y="340" fill="#1C221F" font-family="Arial, Helvetica, sans-serif" font-size="22">读取账户余额</text>
  <text x="126" y="380" fill="#1C221F" font-family="Arial, Helvetica, sans-serif" font-size="22">计算健康评分</text>
  <text x="126" y="420" fill="#1C221F" font-family="Arial, Helvetica, sans-serif" font-size="22">判断借贷成本</text>
  <text x="126" y="460" fill="#1C221F" font-family="Arial, Helvetica, sans-serif" font-size="22">检查 Trader 胜率</text>
  <text x="126" y="534" fill="#62685F" font-family="Arial, Helvetica, sans-serif" font-size="20">输出：是否值得拨付预算</text>

  <rect x="410" y="220" width="280" height="420" rx="28" fill="#F3FBF6" stroke="#BCDFC8" filter="url(#shadow3)"/>
  <text x="446" y="278" fill="#0E6B4D" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">02 · 批准预算</text>
  <text x="446" y="340" fill="#1C221F" font-family="Arial, Helvetica, sans-serif" font-size="22">生成 Grant ID</text>
  <text x="446" y="380" fill="#1C221F" font-family="Arial, Helvetica, sans-serif" font-size="22">确定预算金额</text>
  <text x="446" y="420" fill="#1C221F" font-family="Arial, Helvetica, sans-serif" font-size="22">设置止损边界</text>
  <text x="446" y="460" fill="#1C221F" font-family="Arial, Helvetica, sans-serif" font-size="22">A2A 发给 Trader</text>
  <text x="446" y="534" fill="#62685F" font-family="Arial, Helvetica, sans-serif" font-size="20">输出：预算开始生效</text>

  <rect x="730" y="220" width="280" height="420" rx="28" fill="#FFF8EE" stroke="#E8CB98" filter="url(#shadow3)"/>
  <text x="766" y="278" fill="#B36A22" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">03 · Trader 执行</text>
  <text x="766" y="340" fill="#1C221F" font-family="Arial, Helvetica, sans-serif" font-size="22">仅在预算内下单</text>
  <text x="766" y="380" fill="#1C221F" font-family="Arial, Helvetica, sans-serif" font-size="22">汇报 PnL</text>
  <text x="766" y="420" fill="#1C221F" font-family="Arial, Helvetica, sans-serif" font-size="22">汇报风险等级</text>
  <text x="766" y="460" fill="#1C221F" font-family="Arial, Helvetica, sans-serif" font-size="22">持续写入 A2A 账本</text>
  <text x="766" y="534" fill="#62685F" font-family="Arial, Helvetica, sans-serif" font-size="20">输出：交易过程可回放</text>

  <rect x="1050" y="220" width="280" height="420" rx="28" fill="#FFF4F2" stroke="#E1BCB5" filter="url(#shadow3)"/>
  <text x="1086" y="278" fill="#AF3A2B" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">04 · CFO 回收</text>
  <text x="1086" y="340" fill="#1C221F" font-family="Arial, Helvetica, sans-serif" font-size="22">亏损超限</text>
  <text x="1086" y="380" fill="#1C221F" font-family="Arial, Helvetica, sans-serif" font-size="22">连续亏损触发</text>
  <text x="1086" y="420" fill="#1C221F" font-family="Arial, Helvetica, sans-serif" font-size="22">预算状态改为 REVOKED</text>
  <text x="1086" y="460" fill="#1C221F" font-family="Arial, Helvetica, sans-serif" font-size="22">资金回到 Savings</text>
  <text x="1086" y="534" fill="#62685F" font-family="Arial, Helvetica, sans-serif" font-size="20">输出：风险被当场切断</text>

  <path d="M370 430H410" stroke="#607067" stroke-width="8" stroke-linecap="round"/>
  <path d="M690 430H730" stroke="#607067" stroke-width="8" stroke-linecap="round"/>
  <path d="M1010 430H1050" stroke="#607067" stroke-width="8" stroke-linecap="round"/>

  <rect x="90" y="700" width="1240" height="110" rx="28" fill="#FFFDF8" stroke="#DDD1BC"/>
  <text x="126" y="766" fill="#17211C" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">一句话概括：</text>
  <text x="320" y="766" fill="#5C665F" font-family="Arial, Helvetica, sans-serif" font-size="28">不是让 AI 盲目做交易，而是让 AI 先决定钱该不该动，亏损时再主动把钱收回来。</text>
</svg>

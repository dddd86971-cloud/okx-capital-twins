<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F1E4"/>
      <stop offset="1" stop-color="#F5F8F1"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#26A269"/>
      <stop offset="1" stop-color="#0E6B4D"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F0B45A"/>
      <stop offset="1" stop-color="#D47A31"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E36B5D"/>
      <stop offset="1" stop-color="#AF3A2B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#19211C" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#607067"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#0E6B4D"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#AF3A2B"/>
    </marker>
  </defs>

  <rect width="1600" height="900" rx="36" fill="url(#bg)"/>
  <text x="80" y="92" fill="#17211C" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700">OKX 财管双子星 · 产品演示示意图</text>
  <text x="80" y="128" fill="#5C665F" font-family="Arial, Helvetica, sans-serif" font-size="22">CFO-Trader A2A System · 一个 AI 管钱，一个 AI 交易</text>

  <rect x="80" y="180" width="300" height="520" rx="28" fill="#FFF8ED" stroke="#E4D7BF" filter="url(#shadow)"/>
  <text x="114" y="232" fill="#8A6A2C" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">输入与账户上下文</text>

  <rect x="114" y="270" width="232" height="84" rx="20" fill="#FFFDF8" stroke="#E7DAC3"/>
  <text x="140" y="314" fill="#1C221F" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">账户余额</text>
  <text x="140" y="340" fill="#62685F" font-family="Arial, Helvetica, sans-serif" font-size="18">Funding / Savings / Trading</text>

  <rect x="114" y="374" width="232" height="84" rx="20" fill="#FFFDF8" stroke="#E7DAC3"/>
  <text x="140" y="418" fill="#1C221F" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">市场条件</text>
  <text x="140" y="444" fill="#62685F" font-family="Arial, Helvetica, sans-serif" font-size="18">Borrow Rate / Risk Threshold</text>

  <rect x="114" y="478" width="232" height="84" rx="20" fill="#FFFDF8" stroke="#E7DAC3"/>
  <text x="140" y="522" fill="#1C221F" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Trader 画像</text>
  <text x="140" y="548" fill="#62685F" font-family="Arial, Helvetica, sans-serif" font-size="18">Win Rate / Drawdown / Loss Streak</text>

  <rect x="114" y="582" width="232" height="84" rx="20" fill="#FFFDF8" stroke="#E7DAC3"/>
  <text x="140" y="626" fill="#1C221F" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">治理规则</text>
  <text x="140" y="652" fill="#62685F" font-family="Arial, Helvetica, sans-serif" font-size="18">Budget / Leverage / Recall Limits</text>

  <rect x="470" y="180" width="300" height="520" rx="28" fill="#F2FBF6" stroke="#B7E0C7" filter="url(#shadow)"/>
  <text x="520" y="232" fill="#0E6B4D" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">CFO Agent</text>

  <rect x="504" y="270" width="232" height="104" rx="22" fill="url(#green)"/>
  <text x="540" y="316" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">健康评分</text>
  <text x="540" y="346" fill="#EAF7F0" font-family="Arial, Helvetica, sans-serif" font-size="18">Borrow + Idle + Trader Quality</text>

  <rect x="504" y="398" width="232" height="104" rx="22" fill="#FFFDF8" stroke="#B7E0C7"/>
  <text x="540" y="444" fill="#1C221F" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">预算审批</text>
  <text x="540" y="474" fill="#62685F" font-family="Arial, Helvetica, sans-serif" font-size="18">Adaptive Budget Allocation</text>

  <rect x="504" y="526" width="232" height="104" rx="22" fill="#FFFDF8" stroke="#B7E0C7"/>
  <text x="540" y="572" fill="#1C221F" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">风险回收</text>
  <text x="540" y="602" fill="#62685F" font-family="Arial, Helvetica, sans-serif" font-size="18">Loss / Drawdown / Leverage</text>

  <rect x="860" y="180" width="300" height="520" rx="28" fill="#FFF7EC" stroke="#EACB93" filter="url(#shadow)"/>
  <text x="904" y="232" fill="#B36A22" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">Trader Agent</text>

  <rect x="894" y="270" width="232" height="104" rx="22" fill="url(#amber)"/>
  <text x="938" y="316" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">预算内执行</text>
  <text x="938" y="346" fill="#FFF4E6" font-family="Arial, Helvetica, sans-serif" font-size="18">Spot / Futures Strategy</text>

  <rect x="894" y="398" width="232" height="104" rx="22" fill="#FFFDF8" stroke="#EACB93"/>
  <text x="938" y="444" fill="#1C221F" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">状态回报</text>
  <text x="938" y="474" fill="#62685F" font-family="Arial, Helvetica, sans-serif" font-size="18">PnL / Position / Risk Level</text>

  <rect x="894" y="526" width="232" height="104" rx="22" fill="#FFFDF8" stroke="#EACB93"/>
  <text x="938" y="572" fill="#1C221F" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">遵守边界</text>
  <text x="938" y="602" fill="#62685F" font-family="Arial, Helvetica, sans-serif" font-size="18">No Budget, No Trade</text>

  <rect x="1250" y="180" width="270" height="520" rx="28" fill="#FFF3F1" stroke="#E4B9B3" filter="url(#shadow)"/>
  <text x="1292" y="232" fill="#AF3A2B" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">治理结果</text>

  <rect x="1284" y="270" width="202" height="104" rx="22" fill="#FFFDF8" stroke="#E4B9B3"/>
  <text x="1316" y="316" fill="#1C221F" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">A2A 账本</text>
  <text x="1316" y="346" fill="#62685F" font-family="Arial, Helvetica, sans-serif" font-size="18">Grant / Recall / Event Log</text>

  <rect x="1284" y="398" width="202" height="104" rx="22" fill="#FFFDF8" stroke="#E4B9B3"/>
  <text x="1316" y="444" fill="#1C221F" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">资金保护</text>
  <text x="1316" y="474" fill="#62685F" font-family="Arial, Helvetica, sans-serif" font-size="18">Recall to Savings</text>

  <rect x="1284" y="526" width="202" height="104" rx="22" fill="url(#red)"/>
  <text x="1330" y="572" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">无 CFO 对照</text>
  <text x="1316" y="602" fill="#FDEAE7" font-family="Arial, Helvetica, sans-serif" font-size="18">Show Why Governance Matters</text>

  <path d="M380 438H470" stroke="#607067" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M770 438H860" stroke="#607067" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1160 438H1250" stroke="#607067" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>

  <path d="M736 450C820 450 820 320 894 320" stroke="#0E6B4D" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <text x="778" y="352" fill="#0E6B4D" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Budget Allocate</text>

  <path d="M894 450C820 450 820 560 736 560" stroke="#D47A31" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="774" y="548" fill="#8B4A13" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">PnL Report</text>

  <path d="M894 578C820 578 820 622 736 622" stroke="#AF3A2B" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowRed)"/>
  <text x="768" y="662" fill="#AF3A2B" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Risk Recall</text>

  <text x="80" y="798" fill="#17211C" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">核心表达：</text>
  <text x="228" y="798" fill="#5B645E" font-family="Arial, Helvetica, sans-serif" font-size="28">不是让 AI 直接交易，而是让一个 AI 管钱，另一个 AI 在预算内交易。</text>
</svg>

  <path d="M800 350V420" stroke="#0E6B4D" stroke-width="8" stroke-linecap="round" marker-end="url(#aflow)"/>
  <text x="826" y="398" fill="#0E6B4D" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Budget Allocate</text>

  <path d="M990 530H1124" stroke="#607067" stroke-width="8" stroke-linecap="round" marker-end="url(#aflow)"/>
  <text x="1020" y="504" fill="#5C665F" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Risk Trigger</text>

  <path d="M1314 480C1314 660 800 720 800 640" stroke="#AA3A2B" stroke-width="8" stroke-linecap="round" marker-end="url(#aflow)"/>
  <text x="1038" y="740" fill="#AA3A2B" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Recall to Safety Pool</text>

  <rect x="120" y="710" width="1360" height="110" rx="28" fill="#FFFDF8" stroke="#DFD3BE"/>
  <text x="160" y="772" fill="#17211C" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">关键价值：</text>
  <text x="320" y="772" fill="#5C665F" font-family="Arial, Helvetica, sans-serif" font-size="30">资金不是无限制暴露给 Trader，而是先进入保守池，再按预算进入交易池，风险触发后强制回流。</text>

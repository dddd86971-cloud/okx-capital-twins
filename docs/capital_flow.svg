  <rect width="1600" height="900" rx="36" fill="url(#bg2)"/>
  <text x="80" y="92" fill="#17211C" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700">OKX 财管双子星 · 资金流向示意图</text>
  <text x="80" y="128" fill="#5C665F" font-family="Arial, Helvetica, sans-serif" font-size="22">From Idle Capital to Controlled Risk, then back to Safety</text>

  <rect x="96" y="220" width="380" height="260" rx="32" fill="#FFF9EF" stroke="#E5D8C1" filter="url(#shadow2)"/>
  <text x="136" y="286" fill="#1C221F" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Funding Account</text>
  <text x="136" y="334" fill="#62685F" font-family="Arial, Helvetica, sans-serif" font-size="24">总账户中的可调度资金</text>
  <text x="136" y="390" fill="#0E6B4D" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="700">10,000 USDT</text>
  <text x="136" y="436" fill="#62685F" font-family="Arial, Helvetica, sans-serif" font-size="20">CFO 观察整体余额与资金健康度</text>

  <rect x="610" y="130" width="380" height="220" rx="32" fill="url(#g1)" filter="url(#shadow2)"/>
  <text x="652" y="198" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">Savings / Earn</text>
  <text x="652" y="246" fill="#EAF7F0" font-family="Arial, Helvetica, sans-serif" font-size="22">默认保守池，用于存放闲置资金</text>

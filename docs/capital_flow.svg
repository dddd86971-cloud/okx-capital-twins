  <rect x="1124" y="220" width="380" height="260" rx="32" fill="#FFF4F2" stroke="#E2BBB4" filter="url(#shadow2)"/>
  <text x="1164" y="286" fill="#1C221F" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Risk Recall Result</text>
  <text x="1164" y="334" fill="#62685F" font-family="Arial, Helvetica, sans-serif" font-size="24">当亏损或连损触发阈值时</text>
  <text x="1164" y="390" fill="#AF3A2B" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="700">回收预算</text>

  <rect x="610" y="420" width="380" height="220" rx="32" fill="url(#g2)" filter="url(#shadow2)"/>
  <text x="652" y="488" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">Trading Budget Pool</text>
  <text x="652" y="536" fill="#FFF5E7" font-family="Arial, Helvetica, sans-serif" font-size="22">仅在 CFO 授权后，Trader 才能使用</text>
